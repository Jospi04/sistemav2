version: '3.8'

services:
  web:
    build: .
    container_name: grifo_web
    restart: always
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=grifo_user
      - DB_PASSWORD=grifo_secure_pass
      - DB_NAME=sistema_grifo
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: grifo_db
    restart: always
    ports:
      - "3309:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=grifo_root_secure_pass
      - MYSQL_DATABASE=sistema_grifo
      - MYSQL_USER=grifo_user
      - MYSQL_PASSWORD=grifo_secure_pass
    volumes:
      - grifo_db_data:/var/lib/mysql

volumes:
  grifo_db_data:
